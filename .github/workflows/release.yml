name: Release plugin artifacts

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create/update, e.g. v0.0.1"
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate
        # Skip only the upstream-freshness comparison in check:skill-submodules:
        # this job builds from an immutable tag, so a pin that upstream has since
        # outrun must not fail the release (CI on PRs/main still enforces it).
        env:
          SKILL_SUBMODULE_SKIP_UPSTREAM: "1"
        run: |
          pnpm check:skill-submodules
          pnpm check:skill-drift
          pnpm check:no-content-duplicates
          pnpm check:install-entrypoints
          pnpm check:marketplace-assets
          pnpm check:codex
          pnpm check:claude-desktop
          pnpm -r typecheck

      - name: Package VS Code extension
        run: |
          pnpm --filter volcano build
          pnpm package:vscode
          mkdir -p dist/release
          cp plugins/vscode/volcano.vsix dist/release/volcano-vscode.vsix

      - name: Package Claude Desktop MCPB
        run: |
          rm -f dist/release/volcano-claude-desktop.mcpb
          npx --yes @anthropic-ai/mcpb validate plugins/claude-desktop/manifest.json
          npx --yes @anthropic-ai/mcpb pack plugins/claude-desktop dist/release/volcano-claude-desktop.mcpb

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: volcano-plugin-artifacts
          path: dist/release/*

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: ${{ steps.release_tag.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/release/volcano-vscode.vsix
            dist/release/volcano-claude-desktop.mcpb
