name: Sync skills submodule

# Keeps sources/volcano-skills pinned to the canonical volcano-skills
# default-branch HEAD and regenerates the materialized per-plugin skills.
# CI's check:skill-submodules fails whenever the pin lags that HEAD, so this
# workflow opens the sync PR automatically instead of waiting for a human.

on:
  schedule:
    # Daily at 06:17 UTC.
    - cron: "17 6 * * *"
  workflow_dispatch:
    inputs:
      ref:
        description: "volcano-skills ref to sync to (default: its default-branch HEAD)"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-skills
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          # Falls back to GITHUB_TOKEN; note that a PR opened with GITHUB_TOKEN
          # will not itself trigger the CI workflow. Provide SKILLS_SYNC_TOKEN
          # (a PAT / app token) if you want CI to run on the generated PR.
          token: ${{ secrets.SKILLS_SYNC_TOKEN || github.token }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump volcano-skills submodule
        id: bump
        run: |
          set -euo pipefail
          cd sources/volcano-skills
          git fetch origin
          if [ -n "${{ github.event.inputs.ref }}" ]; then
            target="${{ github.event.inputs.ref }}"
            git fetch origin "$target" || true
            git checkout --detach "$target" 2>/dev/null || git checkout --detach FETCH_HEAD
          else
            # Match check:skill-submodules, which compares against `ls-remote HEAD`
            # (the remote default branch tip).
            git remote set-head origin --auto >/dev/null
            git checkout --detach origin/HEAD
          fi
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Regenerate materialized plugin skills
        run: pnpm sync:skills

      - name: Validate sync
        run: |
          pnpm check:skill-submodules
          pnpm check:skill-drift

      - name: Open or update sync PR
        env:
          GH_TOKEN: ${{ secrets.SKILLS_SYNC_TOKEN || github.token }}
        run: |
          set -euo pipefail
          if git diff --quiet && git diff --cached --quiet; then
            echo "sources/volcano-skills already matches ${{ steps.bump.outputs.short }}; nothing to sync."
            exit 0
          fi

          branch="chore/sync-volcano-skills"
          title="chore: sync volcano-skills submodule to ${{ steps.bump.outputs.short }}"
          body="$(cat <<'EOF'
          Automated sync of the `sources/volcano-skills` submodule to the volcano-skills default-branch HEAD, with the materialized per-plugin skills regenerated via `pnpm sync:skills`.

          - Submodule pinned to `${{ steps.bump.outputs.sha }}`.
          - `check:skill-submodules` and `check:skill-drift` passed inside the sync job.

          Generated by `.github/workflows/sync-skills.yml`. If CI does not run on this PR, it was opened with `GITHUB_TOKEN`; set the `SKILLS_SYNC_TOKEN` secret to have CI run automatically.
          EOF
          )"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch"
          git add sources/volcano-skills plugins
          git commit -m "$title"
          git push --force-with-lease origin "$branch"

          if [ -n "$(gh pr list --head "$branch" --state open --json number --jq '.[].number')" ]; then
            echo "Existing open PR for $branch updated by push."
          else
            gh pr create --base main --head "$branch" --title "$title" --body "$body"
          fi
