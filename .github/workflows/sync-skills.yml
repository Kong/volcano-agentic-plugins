name: Sync skills submodule

# Keeps sources/volcano-skills pinned to the canonical volcano-skills
# default-branch HEAD and regenerates the materialized per-plugin skills.
# CI's check:skill-submodules fails whenever the pin lags that HEAD, so this
# workflow opens the sync PR automatically instead of waiting for a human.
#
# repository_dispatch is fired by volcano-skills's notify-agentic-plugins-sync.yml
# on every push to its main, so syncs happen immediately rather than waiting
# for the daily cron. schedule/workflow_dispatch stay as a safety net + manual
# override.

on:
  schedule:
    # Daily at 06:17 UTC.
    - cron: "17 6 * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [volcano-skills-updated]

# No ambient GITHUB_TOKEN use: auth is entirely via the App-minted token below.
permissions: {}

concurrency:
  group: sync-skills
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.VOLCANO_APP_ID }}
          private-key: ${{ secrets.VOLCANO_APP_KEY }}
          # Without an explicit permission-* input, the minted token inherits
          # every permission the App installation holds, not just what this
          # job needs. Scope it down explicitly.
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump volcano-skills submodule
        id: bump
        run: |
          set -euo pipefail
          cd sources/volcano-skills
          git fetch origin
          # Track the canonical default-branch HEAD, matching check:skill-submodules
          # which compares the pin against `git ls-remote <url> HEAD`.
          git remote set-head origin --auto >/dev/null
          git checkout --detach origin/HEAD
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Regenerate materialized plugin skills
        run: pnpm sync:skills

      - name: Stage submodule bump and regenerated skills
        run: git add sources/volcano-skills plugins

      - name: Validate sync
        # Runs after staging: check:skill-submodules reads the pin from the index
        # (git ls-files --stage), so the new gitlink must be staged first.
        run: |
          pnpm check:skill-submodules
          pnpm check:skill-drift

      - name: Open or update sync PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          if git diff --cached --quiet; then
            echo "sources/volcano-skills already matches ${{ steps.bump.outputs.short }}; nothing to sync."
            exit 0
          fi

          branch="chore/sync-volcano-skills"
          title="chore: sync volcano-skills submodule to ${{ steps.bump.outputs.short }}"
          body="$(cat <<'EOF'
          Automated sync of the `sources/volcano-skills` submodule to the volcano-skills default-branch HEAD, with the materialized per-plugin skills regenerated via `pnpm sync:skills`.

          - Submodule pinned to `${{ steps.bump.outputs.sha }}`.
          - `check:skill-submodules` and `check:skill-drift` passed inside the sync job.

          Generated by `.github/workflows/sync-skills.yml`, authenticated as the "Kong Volcano - app" GitHub App.
          EOF
          )"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Changes were already staged before validation; keep them across the
          # branch switch and commit from the index.
          git checkout -B "$branch"
          git commit -m "$title"
          git push --force-with-lease origin "$branch"

          if [ -n "$(gh pr list --head "$branch" --state open --json number --jq '.[].number')" ]; then
            gh pr edit "$branch" --title "$title" --body "$body"
            echo "Refreshed existing PR for $branch to ${{ steps.bump.outputs.short }}."
          else
            gh pr create --base main --head "$branch" --title "$title" --body "$body"
          fi
