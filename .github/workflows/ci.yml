name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check canonical skill source submodule is latest
        run: pnpm check:skill-submodules

      - name: Check materialized plugin skills match canonical source
        run: pnpm check:skill-drift

      - name: Check canonical content only appears in approved plugin skill directories
        run: pnpm check:no-content-duplicates

      - name: Smoke-test Claude Desktop extension
        run: pnpm check:claude-desktop

      - name: Smoke-test Codex plugin
        run: pnpm check:codex

      - name: Check install entrypoints
        run: pnpm check:install-entrypoints

      - name: Check marketplace assets and metadata
        run: pnpm check:marketplace-assets

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Build VS Code extension
        run: pnpm --filter volcano build

      - name: Package VS Code extension
        run: pnpm package:vscode

      - name: Package Claude Desktop MCPB
        run: pnpm package:claude-desktop

  auto-fix-skill-drift:
    name: Auto-sync volcano-skills into failing PR
    needs: validate
    if: failure() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    # No ambient GITHUB_TOKEN use: auth is entirely via the App-minted token below.
    permissions: {}
    concurrency:
      group: sync-into-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.VOLCANO_APP_ID }}
          private-key: ${{ secrets.VOLCANO_APP_KEY }}
          # Without an explicit permission-* input, the minted token inherits
          # every permission the App installation holds, not just what this
          # job needs (push a branch, open/edit the PR, and label/comment on
          # the original PR). Scope it down explicitly.
          permission-contents: write
          permission-pull-requests: write
          permission-issues: write

      - name: Checkout PR head
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          submodules: recursive
          fetch-depth: 0
          # Don't persist an authenticated remote yet: the PR's own
          # package.json/pnpm-lock.yaml/scripts run below (pnpm install) before
          # the token is actually needed, and this job's token is the more
          # powerful App-minted one. Re-authenticate explicitly just before
          # the push step instead.
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Confirm skill submodule drift caused the failure
        id: recheck
        run: |
          set -euo pipefail
          # validate can fail for unrelated reasons (typecheck, packaging, etc.);
          # only proceed if the skill submodule pin is actually stale.
          if pnpm check:skill-submodules; then
            echo "is_drift=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_drift=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump volcano-skills submodule
        if: steps.recheck.outputs.is_drift == 'true'
        id: bump
        run: |
          set -euo pipefail
          cd sources/volcano-skills
          git fetch origin
          # Match check:skill-submodules, which compares against `ls-remote HEAD`
          # (the remote default branch tip).
          git remote set-head origin --auto >/dev/null
          git checkout --detach origin/HEAD
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Regenerate materialized plugin skills
        if: steps.recheck.outputs.is_drift == 'true'
        run: pnpm sync:skills

      - name: Stage submodule bump and regenerated skills
        if: steps.recheck.outputs.is_drift == 'true'
        run: git add sources/volcano-skills plugins

      - name: Validate sync
        if: steps.recheck.outputs.is_drift == 'true'
        run: |
          pnpm check:skill-submodules
          pnpm check:skill-drift

      - name: Open sync PR into the failing PR's branch
        if: steps.recheck.outputs.is_drift == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          # Route untrusted event data through env instead of interpolating
          # ${{ }} expressions directly into the script: head.ref is the PR
          # author's own branch name and must not be textually substituted
          # into shell text (classic Actions script-injection vector). Env
          # values are passed as inert data, so shell metacharacters in the
          # branch name can't break out of the assignment.
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          SYNC_SHORT_SHA: ${{ steps.bump.outputs.short }}
        run: |
          set -euo pipefail
          pr_number="$PR_NUMBER"
          feature_branch="$PR_HEAD_REF"
          sync_branch="chore/sync-volcano-skills-${pr_number}"
          title="chore: sync volcano-skills submodule into #${pr_number}"
          body="Automated sync of \`sources/volcano-skills\` to \`${SYNC_SHORT_SHA}\`, unblocking #${pr_number} whose \`check:skill-submodules\` check is failing because its pin is behind the canonical repo's HEAD.

          Merge this into \`${feature_branch}\` to unblock CI on #${pr_number}."

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # persist-credentials was disabled at checkout; authenticate the
          # remote now, right before it's actually needed.
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git checkout -B "$sync_branch"
          git commit -m "$title"
          git push --force-with-lease origin "$sync_branch"

          gh label create "needs-skills-sync" --color "FBCA04" \
            --description "Blocked on an automated volcano-skills submodule sync PR" --force

          if [ -n "$(gh pr list --head "$sync_branch" --state open --json number --jq '.[].number')" ]; then
            gh pr edit "$sync_branch" --title "$title" --body "$body"
            sync_pr_number="$(gh pr view "$sync_branch" --json number --jq '.number')"
          else
            sync_pr_url="$(gh pr create --base "$feature_branch" --head "$sync_branch" --title "$title" --body "$body")"
            sync_pr_number="${sync_pr_url##*/}"
          fi

          already_flagged="$(gh pr view "$pr_number" --json labels --jq '[.labels[].name] | any(. == "needs-skills-sync")')"
          gh pr edit "$pr_number" --add-label "needs-skills-sync"
          if [ "$already_flagged" != "true" ]; then
            gh pr comment "$pr_number" --body "⚠️ \`volcano-skills\` has moved upstream and this PR's \`check:skill-submodules\` check is failing as a result. Opened #${sync_pr_number} with the submodule bump — merge it into \`${feature_branch}\` to unblock CI here."
          fi
