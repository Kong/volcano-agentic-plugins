name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check canonical skill source submodule is latest
        run: pnpm check:skill-submodules

      - name: Check materialized plugin skills match canonical source
        run: pnpm check:skill-drift

      - name: Check canonical content only appears in approved plugin skill directories
        run: pnpm check:no-content-duplicates

      - name: Smoke-test Claude Desktop extension
        run: pnpm check:claude-desktop

      - name: Smoke-test Codex plugin
        run: pnpm check:codex

      - name: Check install entrypoints
        run: pnpm check:install-entrypoints

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Build VS Code extension
        run: pnpm --filter volcano build

      - name: Package VS Code extension
        run: pnpm package:vscode

      - name: Package Claude Desktop MCPB
        run: pnpm package:claude-desktop
