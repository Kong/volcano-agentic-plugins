name: Agent behavior eval

on:
  pull_request:

jobs:
  live-eval:
    runs-on: ubuntu-latest
    # Skip (not fail) when the secret isn't configured, e.g. forked-repo PRs
    # without access to repo secrets. See tests/agent-eval/README.md.
    if: ${{ secrets.OPENAI_API_KEY != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run live agent-behavior eval
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: pnpm eval:agent-guidance
